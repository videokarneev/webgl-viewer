<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Transparency Test</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent !important;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #f3efe5;
      }

      .label {
        position: absolute;
        top: 18px;
        left: 18px;
        padding: 8px 10px;
        border: 1px solid rgba(255, 232, 184, 0.35);
        background: rgba(0, 0, 0, 0.18);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        backdrop-filter: blur(4px);
      }

      .ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(54vw, 340px);
        aspect-ratio: 1 / 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 18px solid rgba(245, 202, 97, 0.94);
        background: transparent;
        box-shadow:
          inset 0 0 24px rgba(255, 243, 181, 0.58),
          0 0 38px rgba(255, 213, 122, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="label">Transparent iframe test</div>
    <div class="ring"></div>
  </body>
</html>
