<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLB Viewer</title>
    <script>
      (function () {
        var searchParams = new URL(window.location.href).searchParams;
        var isTransparentPlayer = searchParams.get('player') === '1' && searchParams.get('transparent') === '1';
        var backgroundOverride = (function () {
          var value = searchParams.get('bg');
          if (!value) {
            return null;
          }

          var normalized = value.charAt(0) === '#' ? value : '#' + value;
          return /^#[0-9a-f]{6}$/i.test(normalized) ? normalized : null;
        })();

        if (isTransparentPlayer) {
          var nextBackground = backgroundOverride || 'transparent';
          document.documentElement.classList.add('player-transparent');
          document.documentElement.style.background = nextBackground;

          var earlyStyle = document.createElement('style');
          earlyStyle.textContent =
            'html.player-transparent, html.player-transparent body, html.player-transparent #app {' +
            'background: ' + nextBackground + ' !important;' +
            'background-color: ' + nextBackground + ' !important;' +
            'background-image: none !important;' +
            '}';
          document.head.appendChild(earlyStyle);

          document.addEventListener('DOMContentLoaded', function () {
            document.body.classList.add('player-transparent');
            document.body.style.background = nextBackground;
            var app = document.getElementById('app');
            if (app) {
              app.style.background = nextBackground;
            }
          });
        }

        function showRuntimeError(message) {
          var existing = document.getElementById('runtime-error');
          if (existing) {
            existing.textContent = message;
            return;
          }

          var pre = document.createElement('pre');
          pre.id = 'runtime-error';
          pre.style.position = 'fixed';
          pre.style.inset = '16px';
          pre.style.zIndex = '99999';
          pre.style.margin = '0';
          pre.style.padding = '16px';
          pre.style.overflow = 'auto';
          pre.style.whiteSpace = 'pre-wrap';
          pre.style.background = '#140f12';
          pre.style.color = '#ffd8e1';
          pre.style.border = '1px solid #7a3145';
          pre.style.borderRadius = '8px';
          pre.textContent = message;
          document.addEventListener('DOMContentLoaded', function () {
            document.body.appendChild(pre);
          });
        }

        window.addEventListener('error', function (event) {
          showRuntimeError('Runtime error:\n' + (event.error && event.error.stack ? event.error.stack : event.message));
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason;
          showRuntimeError('Unhandled rejection:\n' + (reason && reason.stack ? reason.stack : String(reason)));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
  </html>
